<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Offerte laden...</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,sans-serif;background:#f0f2f5;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .ld{text-align:center;padding:40px}
  .ld h2{color:#1a1a2e;margin-bottom:12px}
  .ld p{color:#6c757d;font-size:14px}
  .sp{width:40px;height:40px;border:4px solid #dee2e6;border-top-color:#BE1622;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err{color:#BE1622;font-weight:700}
</style>
</head>
<body>
<div class="ld" id="loader">
  <div class="sp"></div>
  <h2>Offerte wordt geladen</h2>
  <p>Even geduld...</p>
</div>
<script>
(function(){
  var SUPA_URL  = "https://aocdvzrjwljmiqnuklkn.supabase.co";
  var SUPA_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFvY2R2enJqd2xqbWlxbnVrbGtuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MTcwNzAsImV4cCI6MjA5NjM5MzA3MH0.3VWhhLZJxtV0io4FucWjxF5FN1ABRKzGbfyqR6NP4M4";

  var params = new URLSearchParams(window.location.search);
  var id = params.get("id");

  if(!id){
    document.getElementById("loader").innerHTML = '<p class="err">Geen offerte-ID opgegeven.</p>';
    return;
  }

  fetch(SUPA_URL + "/rest/v1/signing_pages?id=eq." + encodeURIComponent(id) + "&select=html_content", {
    headers: {
      "apikey": SUPA_ANON,
      "Authorization": "Bearer " + SUPA_ANON
    }
  })
  .then(function(r){ return r.json(); })
  .then(function(rows){
    if(!rows || !rows.length || !rows[0].html_content){
      document.getElementById("loader").innerHTML = '<p class="err">Offerte niet gevonden of verlopen.</p>';
      return;
    }
    // Render the full signing page
    document.open();
    document.write(rows[0].html_content);
    document.close();
  })
  .catch(function(e){
    document.getElementById("loader").innerHTML = '<p class="err">Fout bij laden: ' + e.message + '</p>';
  });
})();
</script>
</body>
</html>
